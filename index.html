<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lark Link Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg1:#070A10;
  --bg2:#0B1220;
  --card: rgba(255,255,255,0.06);
  --stroke: rgba(255,255,255,0.08);
  --text:#EAF0F6;
  --muted:#93A4B5;
  --accent:#4F9CFF;
}

* {
  box-sizing:border-box;
}

body {
  margin:0;
  font-family:Inter;
  color:var(--text);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 20% 20%, rgba(79,156,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(120,80,255,0.18), transparent 45%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* subtle noise overlay */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.04;
  pointer-events:none;
}

.container {
  width:540px;
  padding:28px;
  border-radius:24px;
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter: blur(18px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.45);
}

/* HEADER */
h1 {
  margin:0;
  font-size:22px;
  font-weight:600;
  letter-spacing:-0.02em;
}

p {
  margin:6px 0 18px;
  color:var(--muted);
  font-size:13px;
}

/* ICON GRID */
.platform-icons {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin:18px 0 22px;
}

.icon {
  padding:14px 10px;
  border-radius:16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  text-align:center;
  cursor:pointer;
  transition:0.25s ease;
  position:relative;
  overflow:hidden;
}

.icon:hover {
  transform:translateY(-4px);
  border-color:rgba(79,156,255,0.35);
  box-shadow:0 10px 30px rgba(79,156,255,0.12);
}

.icon img {
  width:52px;
  height:52px;
  border-radius:14px;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.icon span {
  display:block;
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
}

/* INPUT */
.input-wrap {
  position:relative;
}

input {
  width:100%;
  padding:14px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.35);
  color:white;
  outline:none;
  font-size:14px;
  transition:0.2s;
}

input:focus {
  border-color:rgba(79,156,255,0.6);
  box-shadow:0 0 0 4px rgba(79,156,255,0.12);
}

input::placeholder {
  color:#6f8196;
}
</style>
</head>

<body>

<div class="container">

<h1>Lark Launcher</h1>
<p>Tap an app or press Enter to launch instantly</p>

<div class="platform-icons">

  <div class="icon" data-url="https://instagram.com">
    <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=128">
    <span>Instagram</span>
  </div>

  <div class="icon" data-url="https://facebook.com">
    <img src="https://www.google.com/s2/favicons?domain=facebook.com&sz=128">
    <span>Facebook</span>
  </div>

  <div class="icon" data-url="https://tiktok.com">
    <img src="https://www.google.com/s2/favicons?domain=tiktok.com&sz=128">
    <span>TikTok</span>
  </div>

  <div class="icon" data-url="https://youtube.com">
    <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=128">
    <span>YouTube</span>
  </div>

  <div class="icon" data-url="https://github.com">
    <img src="https://www.google.com/s2/favicons?domain=github.com&sz=128">
    <span>GitHub</span>
  </div>

  <div class="icon" data-url="https://google.com">
    <img src="https://www.google.com/s2/favicons?domain=google.com&sz=128">
    <span>Google</span>
  </div>

</div>

<div class="input-wrap">
  <input id="url" placeholder="Type URL or search..." />
</div>

</div>

<script>

const APP_ID = "cli_a9187dead8e19dbb";

const input = document.getElementById("url");
const icons = document.querySelectorAll(".icon");

function normalize(url) {
  if (!url) return "";
  url = url.trim();

  if (/^https?:\/\//i.test(url)) return url;

  if (url.includes(".") && !url.includes(" ")) {
    return "https://" + url;
  }

  return "https://www.google.com/search?q=" + encodeURIComponent(url);
}

function buildLink(url) {
  return `https://applink.larksuite.com/client/web_app/open?appId=${APP_ID}&lk_target_url=${encodeURIComponent(url)}`;
}

function openNow(raw) {
  const url = normalize(raw);
  const final = buildLink(url);
  window.location.href = final;
}

/* instant icon launch */
icons.forEach(icon => {
  icon.addEventListener("click", () => {
    openNow(icon.dataset.url);
  });
});

/* enter key launch */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    openNow(input.value);
  }
});

</script>

</body>
</html>
