<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lark Link Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b0f14;
  --card:#121821;
  --text:#e6edf3;
  --muted:#8b949e;
  --accent:#4f9cff;
}

body {
  margin:0;
  font-family:Inter;
  background:linear-gradient(135deg,#0b0f14,#111927);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:520px;
  background:var(--card);
  padding:24px;
  border-radius:18px;
}

h1 {
  text-align:center;
  margin:0;
}

p {
  text-align:center;
  color:var(--muted);
}

/* ICON GRID */
.platform-icons {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:18px 0;
}

.icon {
  text-align:center;
  cursor:pointer;
  transition:0.2s;
  padding:10px;
}

.icon:hover {
  transform:translateY(-3px);
}

.icon img {
  width:56px;
  height:56px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  background:white;
}

.icon span {
  display:block;
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
}

/* INPUT */
input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #1f2933;
  background:#0b0f14;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>Lark Launcher</h1>
<p>Click icon or press Enter</p>

<!-- ICONS -->
<div class="platform-icons">

  <div class="icon" data-url="https://instagram.com">
    <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=128">
    <span>Instagram</span>
  </div>

  <div class="icon" data-url="https://facebook.com">
    <img src="https://www.google.com/s2/favicons?domain=facebook.com&sz=128">
    <span>Facebook</span>
  </div>

  <div class="icon" data-url="https://tiktok.com">
    <img src="https://www.google.com/s2/favicons?domain=tiktok.com&sz=128">
    <span>TikTok</span>
  </div>

  <div class="icon" data-url="https://youtube.com">
    <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=128">
    <span>YouTube</span>
  </div>

  <div class="icon" data-url="https://github.com">
    <img src="https://www.google.com/s2/favicons?domain=github.com&sz=128">
    <span>GitHub</span>
  </div>

  <div class="icon" data-url="https://google.com">
    <img src="https://www.google.com/s2/favicons?domain=google.com&sz=128">
    <span>Google</span>
  </div>

</div>

<input id="url" placeholder="Type URL or search..." />

</div>

<script>

const APP_ID = "cli_a9187dead8e19dbb";

const input = document.getElementById("url");
const icons = document.querySelectorAll(".icon");

/* normalize URL */
function normalize(url) {
  if (!url) return "";

  url = url.trim();

  if (/^https?:\/\//i.test(url)) return url;

  if (url.includes(".") && !url.includes(" ")) {
    return "https://" + url;
  }

  return "https://www.google.com/search?q=" + encodeURIComponent(url);
}

/* build Lark link */
function buildLink(url) {
  return `https://applink.larksuite.com/client/web_app/open?appId=${APP_ID}&lk_target_url=${encodeURIComponent(url)}`;
}

/* open instantly */
function openNow(raw) {
  const url = normalize(raw);
  const final = buildLink(url);
  window.location.href = final;
}

/* ICON CLICK = instant open */
icons.forEach(icon => {
  icon.addEventListener("click", () => {
    openNow(icon.dataset.url);
  });
});

/* ENTER = instant open */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    openNow(input.value);
  }
});

</script>

</body>
</html>
