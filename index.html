<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lark Link Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f14;
  --card: #121821;
  --accent: #4f9cff;
  --text: #e6edf3;
  --muted: #8b949e;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0b0f14, #111927);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  background: var(--card);
  padding: 32px;
  border-radius: 20px;
  width: 100%;
  max-width: 520px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.05);
}

h1 {
  margin: 0 0 10px;
  font-size: 26px;
  text-align: center;
}

p {
  text-align: center;
  color: var(--muted);
  margin-bottom: 24px;
}

select, input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #1f2933;
  background: #0b0f14;
  color: var(--text);
  margin-bottom: 16px;
  font-size: 15px;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(79,156,255,0.25);
}

.output {
  background: #0b0f14;
  border: 1px dashed #2a3441;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  word-break: break-all;
  color: var(--muted);
  min-height: 44px;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary {
  background: var(--accent);
  color: white;
}

.secondary {
  background: #1f2933;
  color: var(--text);
}

button:hover { opacity: 0.9; }

.copy-success {
  font-size: 12px;
  color: #4ade80;
  text-align: center;
  margin-top: 6px;
  display: none;
}
</style>
</head>
<body>

<div class="container">
  <h1>Lark Link Generator</h1>
  <p>Generate and copy Lark deep links instantly.</p>

  <select id="platform">
    <option value="">Custom URL</option>
    <option value="https://instagram.com">Instagram</option>
    <option value="https://facebook.com">Facebook</option>
    <option value="https://tiktok.com">TikTok</option>
    <option value="https://github.com">GitHub</option>
  </select>

  <input id="url" placeholder="Enter or paste URL" />

  <div class="output" id="output">Your generated link will appear here...</div>

  <div class="actions">
    <button class="primary" onclick="openLink()">Open</button>
    <button class="secondary" onclick="copyLink()">Copy</button>
  </div>

  <div class="copy-success" id="copied">Copied to clipboard ✓</div>
</div>

<script>
const APP_ID = "cli_a9187dead8e19dbb";
let finalLink = "";

const platform = document.getElementById("platform");
const input = document.getElementById("url");
const output = document.getElementById("output");

platform.addEventListener("change", () => {
  if (platform.value) input.value = platform.value;
  generate();
});

input.addEventListener("input", generate);

function normalize(url) {
  if (!url) return "";
  return /^https?:\/\//i.test(url) ? url : "https://" + url;
}

function generate() {
  const raw = input.value.trim();
  if (!raw) {
    output.textContent = "Your generated link will appear here...";
    finalLink = "";
    return;
  }

  const clean = normalize(raw);
  const encoded = encodeURIComponent(clean);

  finalLink = `https://applink.larksuite.com/client/web_app/open?appId=${APP_ID}&lk_target_url=${encoded}`;

  output.textContent = finalLink;
}

function openLink() {
  if (finalLink) window.open(finalLink, "_blank");
}

function copyLink() {
  if (!finalLink) return;
  navigator.clipboard.writeText(finalLink);
  const msg = document.getElementById("copied");
  msg.style.display = "block";
  setTimeout(() => msg.style.display = "none", 1500);
}
</script>

</body>
</html>
