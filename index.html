<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lark Link Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background: #111; color: #eee; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
.container { background: #222; padding: 40px; border-radius: 20px; max-width: 500px; width: 100%; border-top: 6px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h1 { margin-bottom: 10px; font-size: 28px; font-weight: 700; text-align: center; color: #fff; }
p { margin-bottom: 25px; color: #ccc; text-align: center; font-size: 16px; }
select, input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #444; background: #111; color: #eee; font-size: 16px; transition: all 0.3s; }
select:focus, input:focus { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.2); outline: none; }
button { padding: 14px 22px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; transition: all 0.3s; font-weight: 600; }
button.visit { background: #fff; color: #111; box-shadow: 0 4px 12px rgba(255,255,255,0.2); }
button.visit:hover { background: #eee; }
</style>
</head>
<body>
<div class="container">
<h1>Lark Link Generator</h1>
<p>Select a platform template or pick custom URL to enter your link.</p>
<select id="platformSelect" onchange="handleSelect()">
  <option value="">--Custom URL--</option>
  <option value="https://www.instagram.com">Instagram</option>
  <option value="https://www.facebook.com">Facebook</option>
  <option value="https://www.tiktok.com">TikTok</option>
  <option value="https://github.com">GitHub</option>
  <option value="https://chat.openai.com">ChatGPT</option>
</select>
<input id="customUrl" placeholder="Enter URL" style="display:none;">
<div style="display:flex; justify-content:flex-start; margin-top:10px;">
  <button id="visitBtn" class="visit" style="display:none;" onclick="visitLink()">Visit Link</button>
</div>
</div>
<script>
const APP_ID = "cli_a9187dead8e19dbb";
let currentLink = '';

function handleSelect() {
  const select = document.getElementById('platformSelect');
  const input = document.getElementById('customUrl');
  if (select.value === '') {
    input.style.display = 'block';
    input.value = '';
  } else {
    input.style.display = 'none';
    input.value = select.value;
  }
  generateLink();
}

document.getElementById('customUrl').addEventListener('input', generateLink);

function generateLink() {
  const inputField = document.getElementById('customUrl');
  const url = inputField.style.display === 'block' ? inputField.value.trim() : inputField.value;
  if (!url) { document.getElementById('visitBtn').style.display = 'none'; return; }
  const finalUrl = !/^https?:\/\//i.test(url) ? 'https://' + url : url;
  const encoded = encodeURIComponent(finalUrl);
  currentLink = `https://applink.larksuite.com/client/web_app/open?appId=${APP_ID}&lk_target_url=${encoded}`;
  document.getElementById('visitBtn').style.display = 'inline-block';
}

function visitLink() { if (currentLink) window.open(currentLink, '_blank'); }
</script>
</body>
</html>
