<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lark Link Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #111; }
.container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); max-width: 500px; width: 100%; border-top: 6px solid #2563eb; }
h1 { margin-bottom: 10px; font-size: 28px; font-weight: 700; text-align: center; color: #1e3c72; }
p { margin-bottom: 25px; color: #555; text-align: center; font-size: 16px; }
select, input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 16px; transition: all 0.3s; }
select:focus, input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); outline: none; }
button { padding: 14px 22px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; transition: all 0.3s; font-weight: 600; }
button.generate { background: #2563eb; color: white; margin-right: 12px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }
button.generate:hover { background: #1d4ed8; transform: translateY(-2px); }
button.visit { background: #f59e0b; color: white; box-shadow: 0 4px 12px rgba(245,158,11,0.4); }
button.visit:hover { background: #d97706; transform: translateY(-2px); }
button.copy { background: #10b981; color: white; margin-top: 15px; width: 100%; box-shadow: 0 4px 12px rgba(16,185,129,0.4); }
button.copy:hover { background: #059669; transform: translateY(-2px); }
.result { margin-top: 20px; background: #f0f4ff; padding: 18px; border-radius: 12px; word-break: break-all; font-family: monospace; font-size: 15px; display: none; box-shadow: inset 0 2px 6px rgba(0,0,0,0.05); }
</style>
</head>
<body>
<div class="container">
<h1>Lark Link Generator</h1>
<p>Select a platform template or pick custom URL to enter your link.</p>
<select id="platformSelect" onchange="handleSelect()">
  <option value="">--Custom URL--</option>
  <option value="https://www.instagram.com">Instagram</option>
  <option value="https://www.facebook.com">Facebook</option>
  <option value="https://www.tiktok.com">TikTok</option>
  <option value="https://github.com">GitHub</option>
  <option value="https://chat.openai.com">ChatGPT</option>
</select>
<input id="customUrl" placeholder="Enter URL" style="display:none;">
<div style="display:flex; justify-content:flex-start; margin-top:10px;">
  <button class="generate" onclick="generate()">Generate Link</button>
  <button id="visitBtn" class="visit" style="display:none;" onclick="visitLink()">Visit Link</button>
</div>
<div id="output" class="result"></div>
<button id="copyBtn" class="copy" style="display:none;" onclick="copyLink()">Copy Link</button>
</div>
<script>
const APP_ID = "cli_a9187dead8e19dbb";
let currentLink = '';

function handleSelect() {
  const select = document.getElementById('platformSelect');
  const input = document.getElementById('customUrl');
  if (select.value === '') {
    input.style.display = 'block';
    input.value = '';
  } else {
    input.style.display = 'none';
    input.value = select.value;
  }
}

function generate() {
  const url = document.getElementById('customUrl').style.display === 'block' ? document.getElementById('customUrl').value.trim() : document.getElementById('customUrl').value;
  if (!url) { alert('Please enter a URL or pick a template'); return; }
  const finalUrl = !/^https?:\/\//i.test(url) ? 'https://' + url : url;
  const encoded = encodeURIComponent(finalUrl);
  currentLink = `https://applink.larksuite.com/client/web_app/open?appId=${APP_ID}&lk_target_url=${encoded}`;
  const output = document.getElementById('output');
  output.style.display = 'block';
  output.textContent = currentLink;
  document.getElementById('copyBtn').style.display = 'inline-block';
  document.getElementById('visitBtn').style.display = 'inline-block';
}

function copyLink() { navigator.clipboard.writeText(currentLink); alert('Copied to clipboard!'); }
function visitLink() { if (currentLink) window.open(currentLink, '_blank'); }
</script>
</body>
</html>
