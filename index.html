<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lark Link Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0f14;
  --card: #121821;
  --accent: #4f9cff;
  --text: #e6edf3;
  --muted: #8b949e;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0b0f14, #111927);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  background: var(--card);
  padding: 32px;
  border-radius: 20px;
  width: 100%;
  max-width: 520px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

h1 {
  margin: 0 0 10px;
  font-size: 26px;
  text-align: center;
}

p {
  text-align: center;
  color: var(--muted);
  margin-bottom: 20px;
}

/* GRID */
.platform-icons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 16px;
}

/* APP STYLE ICON */
.icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  transition: 0.2s;

  padding: 12px;
}

.icon:hover {
  transform: translateY(-3px);
}

/* REAL APP ICON LOOK */
.icon img {
  width: 56px;
  height: 56px;
  border-radius: 16px; /* App store style */
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  background: white;
}

/* LABEL */
.icon span {
  margin-top: 6px;
  font-size: 12px;
  color: var(--muted);
}

/* ACTIVE */
.icon.active img {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #1f2933;
  background: #0b0f14;
  color: var(--text);
  font-size: 15px;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(79,156,255,0.25);
}
</style>
</head>

<body>

<div class="container">
  <h1>Lark Link Launcher</h1>
  <p>Tap an app or paste a custom URL</p>

  <div class="platform-icons">

    <div class="icon" data-url="https://instagram.com">
      <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=128">
      <span>Instagram</span>
    </div>

    <div class="icon" data-url="https://facebook.com">
      <img src="https://www.google.com/s2/favicons?domain=facebook.com&sz=128">
      <span>Facebook</span>
    </div>

    <div class="icon" data-url="https://tiktok.com">
      <img src="https://www.google.com/s2/favicons?domain=tiktok.com&sz=128">
      <span>TikTok</span>
    </div>

    <div class="icon" data-url="https://github.com">
      <img src="https://www.google.com/s2/favicons?domain=github.com&sz=128">
      <span>GitHub</span>
    </div>

    <div class="icon" data-url="https://youtube.com">
      <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=128">
      <span>YouTube</span>
    </div>

    <div class="icon" data-url="https://google.com">
      <img src="https://www.google.com/s2/favicons?domain=google.com&sz=128">
      <span>Google</span>
    </div>

  </div>

  <input id="url" placeholder="Paste custom URL or type anything..." />
</div>

<script>
const APP_ID = "cli_a9187dead8e19dbb";
const icons = document.querySelectorAll(".icon");
const input = document.getElementById("url");

let timer = null;

function buildLink(url) {
  return `https://applink.larksuite.com/client/web_app/open?appId=${APP_ID}&lk_target_url=${encodeURIComponent(url)}`;
}

function openLink(url) {
  window.location.href = buildLink(url);
}

icons.forEach(icon => {
  icon.addEventListener("click", () => {
    icons.forEach(i => i.classList.remove("active"));
    icon.classList.add("active");
    openLink(icon.dataset.url);
  });
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const val = input.value.trim();
    if (val) openLink(val);
  }
});

input.addEventListener("input", () => {
  clearTimeout(timer);
  const val = input.value.trim();
  if (!val) return;

  timer = setTimeout(() => {
    openLink(val);
  }, 700);
});
</script>

</body>
</html>
