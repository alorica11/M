<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<style>
    body{
        margin:0;
        width:100vw;
        height:100vh;
        background:white;
        overflow:hidden;

        display:flex;
        align-items:center;
        justify-content:center;
    }

    /* Hidden Launcher */
    #launcher{
        position:fixed;
        inset:0;

        display:none;

        background:#0b1020;

        align-items:center;
        justify-content:center;

        z-index:9999;
    }

    .box{
        width:520px;

        background:rgba(255,255,255,0.05);

        border:1px solid rgba(255,255,255,0.08);

        border-radius:24px;

        padding:35px;

        backdrop-filter:blur(30px);
    }

    .apps{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:18px;
        margin-bottom:22px;
    }

    .app{
        background:rgba(255,255,255,0.05);

        border-radius:18px;

        padding:20px;

        text-align:center;

        cursor:pointer;

        transition:0.2s;
    }

    .app:hover{
        transform:translateY(-4px);
        background:rgba(255,255,255,0.09);
    }

    .app img{
        width:42px;
        height:42px;
        margin-bottom:10px;
    }

    .app span{
        display:block;
        font-size:12px;
        color:white;
        font-family:Arial,sans-serif;
    }

    input{
        width:100%;
        height:58px;

        border:none;
        outline:none;

        border-radius:18px;

        background:rgba(0,0,0,0.4);

        color:white;

        font-size:16px;

        padding:0 20px;

        box-sizing:border-box;
    }
</style>
</head>

<body>

<div id="launcher">

    <div class="box">

        <div class="apps">

            <div class="app" data-url="https://google.com">
                <img src="https://www.google.com/s2/favicons?domain=google.com&sz=128">
                <span>Google</span>
            </div>

            <div class="app" data-url="https://youtube.com">
                <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=128">
                <span>YouTube</span>
            </div>

            <div class="app" data-url="https://facebook.com">
                <img src="https://www.google.com/s2/favicons?domain=facebook.com&sz=128">
                <span>Facebook</span>
            </div>

            <div class="app" data-url="https://instagram.com">
                <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=128">
                <span>Instagram</span>
            </div>

            <div class="app" data-url="https://tiktok.com">
                <img src="https://www.google.com/s2/favicons?domain=tiktok.com&sz=128">
                <span>TikTok</span>
            </div>

            <div class="app" data-url="https://openai.com">
                <img src="https://www.google.com/s2/favicons?domain=openai.com&sz=128">
                <span>AI</span>
            </div>

        </div>

        <input id="search" placeholder="Search or enter URL">

    </div>

</div>

<script>

const launcher = document.getElementById("launcher");
const input = document.getElementById("search");

let code = "";

/* SECRET OPEN */
document.addEventListener("keydown",(e)=>{

    if(e.key.length > 1) return;

    code += e.key;

    code = code.slice(-2);

    if(code === "99"){
        launcher.style.display = "flex";
        input.focus();
    }

});

/* OPEN URL */
function openURL(value){

    if(!value) return;

    let final = value.trim();

    if(!/^https?:\/\//i.test(final)){

        if(final.includes("."))
            final = "https://" + final;

        else
            final = "https://www.google.com/search?q=" + encodeURIComponent(final);
    }

    window.location.href = final;
}

/* ENTER SEARCH */
input.addEventListener("keydown",(e)=>{
    if(e.key === "Enter"){
        openURL(input.value);
    }
});

/* APP CLICKS */
document.querySelectorAll(".app").forEach(app=>{

    app.addEventListener("click",()=>{

        openURL(app.dataset.url);

    });

});

/* ESC TO HIDE */
document.addEventListener("keydown",(e)=>{

    if(e.key === "Escape"){

        launcher.style.display = "none";

    }

});

</script>

</body>
</html>
