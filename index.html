<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hidden Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #010204;
    --card: rgba(10, 12, 18, 0.7);
    --border: rgba(255, 255, 255, 0.07);
    --accent: #818cf8;
    --text-primary: #ffffff;
    --text-secondary: #8a99ae;
    --input-bg: rgba(0, 0, 0, 0.5);
    --spring-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    --momentum-easing: cubic-bezier(0.16, 1, 0.3, 1);
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* hidden effects */
.ambient-mesh, .noise-overlay { display: none; }

.ambient-mesh {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: radial-gradient(circle at 50% 50%, #0a0b14 0%, #010204 100%);
}

.noise-overlay {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    opacity: 0.05;
}

/* CARD */
.launcher-card {
    width: 560px;
    padding: 50px;
    border-radius: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(50px) saturate(200%);
    box-shadow: 0 40px 120px rgba(0,0,0,0.9);
    display: none;
    opacity: 0;
    transform: scale(0.95);
}

/* HEADER */
header {
    text-align: center;
    margin-bottom: 25px;
}
h1 {
    font-size: 34px;
    margin: 0;
    color: white;
}
header p {
    color: var(--text-secondary);
    margin-top: 8px;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.tab-btn {
    padding: 10px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: white;
    cursor: pointer;
    font-weight: 600;
}

.tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
}

/* GRID */
.app-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 25px;
}

.app-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px;
    border-radius: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: 0.3s;
}

.app-item:hover {
    transform: translateY(-6px) scale(1.05);
    background: rgba(255,255,255,0.08);
}

.app-item img {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    margin-bottom: 10px;
}

.app-item span {
    font-size: 11px;
    color: white;
    font-weight: 600;
}

/* SEARCH */
input {
    width: 100%;
    height: 55px;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: white;
    padding: 0 18px;
    outline: none;
}

input:focus {
    border-color: var(--accent);
}

.hidden { display: none !important; }

</style>
</head>

<body>

<div class="ambient-mesh"></div>
<div class="noise-overlay"></div>

<div class="launcher-card" id="card">

    <header>
        <h1>Lark Launcher</h1>
        <p>Your Intelligent Gateway</p>
    </header>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="apps">Apps</button>
        <button class="tab-btn" data-tab="games">Games</button>
    </div>

    <!-- APPS -->
    <div class="app-grid" id="appsGrid">

        <div class="app-item" data-url="https://instagram.com">
            <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=128">
            <span>Instagram</span>
        </div>

        <div class="app-item" data-url="https://facebook.com">
            <img src="https://www.google.com/s2/favicons?domain=facebook.com&sz=128">
            <span>Facebook</span>
        </div>

        <div class="app-item" data-url="https://youtube.com">
            <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=128">
            <span>YouTube</span>
        </div>

<div class="app-item" data-url="https://www.jango.com">
    <img src="https://www.google.com/s2/favicons?domain=jango.com&sz=128">
    <span>Jango MUSIC </span>
</div>
        
        <div class="app-item" data-url="https://google.com">
            <img src="https://www.google.com/s2/favicons?domain=google.com&sz=128">
            <span>Google</span>
        </div>

        <div class="app-item" data-url="https://tiktok.com">
            <img src="https://www.google.com/s2/favicons?domain=tiktok.com&sz=128">
            <span>TikTok</span>
        </div>

        <div class="app-item" data-url="https://chatgpt.com">
            <img src="https://www.google.com/s2/favicons?domain=openai.com&sz=128">
            <span>AI</span>
        </div>

    </div>

    <!-- GAMES -->
    <div class="app-grid hidden" id="gamesGrid">

        <div class="app-item" data-url="https://slither.io">
            <img src="https://www.google.com/s2/favicons?domain=slither.io&sz=128">
            <span>Slither.io</span>
        </div>

        <div class="app-item" data-url="https://adversator.com">
            <img src="https://www.google.com/s2/favicons?domain=adversator.com&sz=128">
            <span>Adversator</span>
        </div>

        <div class="app-item" data-url="https://smashkarts.io">
            <img src="https://www.google.com/s2/favicons?domain=smashkarts.io&sz=128">
            <span>Smash Karts</span>
        </div>

        <div class="app-item" data-url="https://www.retrogames.cc/arcade-games/marvel-vs-capcom-clash-of-super-heroes-980123-usa.html">
            <img src="https://www.google.com/s2/favicons?domain=retrogames.cc&sz=128">
            <span>Marvel vs Capcom</span>
        </div>

        <div class="app-item" data-url="https://o2jam.world">
        <img src="https://www.google.com/s2/favicons?domain=o2jam.world&sz=128">
        <span>O2Jam World</span>
        </div>
        
        <div class="app-item" data-url="https://kbhgames.com/game/metal-slug-3">
            <img src="https://www.google.com/s2/favicons?domain=kbhgames.com&sz=128">
            <span>Metal Slug 3</span>
        </div>

        <div class="app-item" data-url="https://chess.com">
            <img src="https://www.google.com/s2/favicons?domain=chess.com&sz=128">
            <span>Chess</span>
        </div>

        <div class="app-item" data-url="https://www.miniclip.com/games/8-ball-pool-multiplayer/en/">
            <img src="https://www.google.com/s2/favicons?domain=miniclip.com&sz=128">
            <span>8 Ball Pool</span>
        </div>

    </div>

    <!-- SEARCH -->
    <input id="urlInput" placeholder="Enter URL or search..." />

</div>

<script>

const card = document.getElementById("card");
const input = document.getElementById("urlInput");

const appsGrid = document.getElementById("appsGrid");
const gamesGrid = document.getElementById("gamesGrid");

const tabs = document.querySelectorAll(".tab-btn");
const items = document.querySelectorAll(".app-item");

let secretCode = "";
let inactivityTimer;

/* TAB SWITCH */
tabs.forEach(btn => {
    btn.addEventListener("click", () => {
        tabs.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        if (btn.dataset.tab === "apps") {
            appsGrid.classList.remove("hidden");
            gamesGrid.classList.add("hidden");
        } else {
            gamesGrid.classList.remove("hidden");
            appsGrid.classList.add("hidden");
        }
    });
});

/* OPEN APP */
items.forEach(item => {
    item.addEventListener("click", () => {
        window.location.href = item.dataset.url;
    });
});

/* SEARCH */
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        let url = input.value;

        if (!url.includes("http")) {
            url = "https://www.google.com/search?q=" + encodeURIComponent(url);
        }

        window.location.href = url;
    }
});

/* SECRET OPEN (bb) */
document.addEventListener("keydown", (e) => {
    if (e.key.length > 1) return;

    secretCode += e.key;
    secretCode = secretCode.slice(-2);

    if (secretCode === "bb") {
        document.querySelector(".ambient-mesh").style.display = "block";
        document.querySelector(".noise-overlay").style.display = "block";

        card.style.display = "block";

        requestAnimationFrame(() => {
            card.style.opacity = "1";
            card.style.transform = "scale(1)";
        });
    }
});

</script>

</body>
</html>
