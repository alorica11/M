<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hidden Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #010204;
    --card: rgba(10, 12, 18, 0.7);
    --border: rgba(255, 255, 255, 0.07);
    --accent: #818cf8;
    --text-primary: #ffffff;
    --text-secondary: #8a99ae;
    --input-bg: rgba(0, 0, 0, 0.5);
    --spring-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    --momentum-easing: cubic-bezier(0.16, 1, 0.3, 1);
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Launcher */
.launcher-card {
    width: 540px;
    padding: 56px;
    border-radius: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(50px) saturate(200%);
    box-shadow: 0 40px 120px -20px rgba(0,0,0,0.9);
    display: none;
    opacity: 0;
    transform: scale(0.95);
    position: relative;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
}

.tab-btn {
    padding: 8px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
}

.tab-btn.active {
    color: white;
    background: rgba(129,140,248,0.2);
    border-color: var(--accent);
}

/* Grid */
.app-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 30px;
    display: none;
}

.app-grid.active {
    display: grid;
}

.app-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: 0.3s;
}

.app-item:hover {
    transform: translateY(-6px);
    background: rgba(255,255,255,0.07);
}

.app-item img {
    width: 40px;
    height: 40px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.app-item span {
    font-size: 11px;
    color: white;
    text-align: center;
}

/* Input */
input {
    width: 100%;
    height: 56px;
    padding: 0 20px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    color: white;
    outline: none;
}
</style>
</head>

<body>

<div class="launcher-card" id="card">

<header>
    <h1 style="text-align:center; color:white;">Lark Launcher</h1>
</header>

<!-- Tabs -->
<div class="tabs">
    <div class="tab-btn active" onclick="switchTab('apps')">Apps</div>
    <div class="tab-btn" onclick="switchTab('games')">Games</div>
</div>

<!-- APPS -->
<div class="app-grid active" id="apps">

    <div class="app-item" data-url="https://instagram.com">
        <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=128">
        <span>Instagram</span>
    </div>

    <div class="app-item" data-url="https://facebook.com">
        <img src="https://www.google.com/s2/favicons?domain=facebook.com&sz=128">
        <span>Facebook</span>
    </div>

    <div class="app-item" data-url="https://youtube.com">
        <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=128">
        <span>YouTube</span>
    </div>

    <div class="app-item" data-url="https://google.com">
        <img src="https://www.google.com/s2/favicons?domain=google.com&sz=128">
        <span>Google</span>
    </div>

    <div class="app-item" data-url="https://tiktok.com">
        <img src="https://www.google.com/s2/favicons?domain=tiktok.com&sz=128">
        <span>TikTok</span>
    </div>

    <div class="app-item" data-url="https://openai.com">
        <img src="https://www.google.com/s2/favicons?domain=openai.com&sz=128">
        <span>AI</span>
    </div>

</div>

<!-- GAMES -->
<div class="app-grid" id="games">

    <div class="app-item" data-url="https://agar.io"><img src="https://www.google.com/s2/favicons?domain=agar.io&sz=128"><span>Agar.io</span></div>
    <div class="app-item" data-url="https://slither.io"><img src="https://www.google.com/s2/favicons?domain=slither.io&sz=128"><span>Slither.io</span></div>
    <div class="app-item" data-url="https://krunker.io"><img src="https://www.google.com/s2/favicons?domain=krunker.io&sz=128"><span>Krunker</span></div>
    <div class="app-item" data-url="https://diep.io"><img src="https://www.google.com/s2/favicons?domain=diep.io&sz=128"><span>Diep.io</span></div>
    <div class="app-item" data-url="https://shellshock.io"><img src="https://www.google.com/s2/favicons?domain=shellshock.io&sz=128"><span>ShellShock</span></div>
    <div class="app-item" data-url="https://paper.io"><img src="https://www.google.com/s2/favicons?domain=paper.io&sz=128"><span>Paper.io</span></div>
    <div class="app-item" data-url="https://slopegame.net"><img src="https://www.google.com/s2/favicons?domain=slopegame.net&sz=128"><span>Slope</span></div>
    <div class="app-item" data-url="https://littlealchemy.com"><img src="https://www.google.com/s2/favicons?domain=littlealchemy.com&sz=128"><span>Alchemy</span></div>
    <div class="app-item" data-url="https://geoguessr.com"><img src="https://www.google.com/s2/favicons?domain=geoguessr.com&sz=128"><span>GeoGuessr</span></div>
    <div class="app-item" data-url="https://bonk.io"><img src="https://www.google.com/s2/favicons?domain=bonk.io&sz=128"><span>Bonk.io</span></div>
    <div class="app-item" data-url="https://www.crazygames.com/game/minecraft-classic"><img src="https://www.google.com/s2/favicons?domain=crazygames.com&sz=128"><span>Minecraft</span></div>
    <div class="app-item" data-url="https://poki.com/en/g/8-ball-pool"><img src="https://www.google.com/s2/favicons?domain=poki.com&sz=128"><span>8 Ball Pool</span></div>
    <div class="app-item" data-url="https://tanktrouble.com"><img src="https://www.google.com/s2/favicons?domain=tanktrouble.com&sz=128"><span>Tank Trouble</span></div>
    <div class="app-item" data-url="https://cookieclicker.com"><img src="https://www.google.com/s2/favicons?domain=cookieclicker.com&sz=128"><span>Cookie Clicker</span></div>
    <div class="app-item" data-url="https://surviv.io"><img src="https://www.google.com/s2/favicons?domain=surviv.io&sz=128"><span>Surviv.io</span></div>
    <div class="app-item" data-url="https://www.crazygames.com/game/uno-online"><img src="https://www.google.com/s2/favicons?domain=crazygames.com&sz=128"><span>UNO</span></div>
    <div class="app-item" data-url="https://marioemulator.net"><img src="https://www.google.com/s2/favicons?domain=marioemulator.net&sz=128"><span>Mario</span></div>
    <div class="app-item" data-url="https://www.crazygames.com/game/bullet-force-multiplayer"><img src="https://www.google.com/s2/favicons?domain=crazygames.com&sz=128"><span>Bullet Force</span></div>
    <div class="app-item" data-url="https://roblox.com"><img src="https://www.google.com/s2/favicons?domain=roblox.com&sz=128"><span>Roblox</span></div>
    <div class="app-item" data-url="https://poki.com"><img src="https://www.google.com/s2/favicons?domain=poki.com&sz=128"><span>Poki Games</span></div>

</div>

<input id="urlInput" placeholder="Enter URL or search..." />

</div>

<script>

const card = document.getElementById("card");
const input = document.getElementById("urlInput");
const items = document.querySelectorAll(".app-item");

let secretCode = "";

/* Tabs */
function switchTab(tab) {
    document.getElementById("apps").classList.remove("active");
    document.getElementById("games").classList.remove("active");

    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

    if (tab === "apps") {
        document.getElementById("apps").classList.add("active");
        document.querySelectorAll(".tab-btn")[0].classList.add("active");
    } else {
        document.getElementById("games").classList.add("active");
        document.querySelectorAll(".tab-btn")[1].classList.add("active");
    }
}

/* Secret open */
document.addEventListener("keydown", (e) => {
    if (e.key.length > 1) return;

    secretCode += e.key;
    secretCode = secretCode.slice(-2);

    if (secretCode === "bb") {
        card.style.display = "block";
        setTimeout(() => {
            card.style.opacity = "1";
            card.style.transform = "scale(1)";
        }, 50);
        input.focus();
    }
});

/* Launch */
function normalizeURL(url) {
    if (!url) return "";
    if (/^https?:\/\//i.test(url)) return url;
    if (url.includes(".")) return "https://" + url;
    return "https://www.google.com/search?q=" + encodeURIComponent(url);
}

function launch(url) {
    const final = normalizeURL(url);
    window.location.href = final;
}

/* Click items */
items.forEach(i => {
    i.addEventListener("click", () => launch(i.dataset.url));
});

/* Enter search */
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") launch(input.value);
});

</script>

</body>
</html>
