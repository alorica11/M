<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone 17 Premium Logger</title>
<style>
/* --- Body --- */
body {
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background: linear-gradient(145deg, #cfd6e0, #e6ebf1);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

/* --- iPhone 17 Frame --- */
.iphone-frame {
    width: 390px;
    height: 844px;
    border-radius: 60px;
    background: linear-gradient(145deg,#f0f0f3,#d1d1d5);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.4);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
}
.iphone-frame::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    border-radius: 60px;
    border: 4px solid rgba(200,200,200,0.6);
    pointer-events:none;
}

/* --- Screen --- */
.screen {
    width: 360px;
    height: 760px;
    margin-top: 10px;
    border-radius: 50px;
    background: linear-gradient(145deg,#fefefe,#e0e0e0);
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.05), inset 0 0 10px rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
}

/* --- Notch --- */
.notch {
    width: 210px;
    height: 32px;
    background: #000;
    border-radius: 0 0 18px 18px;
    margin: 10px auto 5px;
    position: relative;
    box-shadow: inset 0 -1px 4px rgba(255,255,255,0.2);
}
.notch::before {
    content:'';
    position:absolute;
    top:8px; left:50%;
    transform:translateX(-50%);
    width:60px; height:6px;
    background: rgba(255,255,255,0.3);
    border-radius:3px;
}
.notch::after {
    content:'';
    position:absolute;
    top:8px; left:10px;
    width:10px; height:10px;
    background: rgba(255,255,255,0.3);
    border-radius:50%;
}

/* --- Top Bar --- */
.top-bar {
    text-align:center;
    font-weight:600;
    color:#fff;
    font-size:18px;
    margin-bottom:10px;
}

/* --- Paste Area --- */
#pasteArea {
    flex:1;
    margin:10px 20px;
    border:2px dashed #ccc;
    border-radius:25px;
    background:#f8f8f8;
    color:#888;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap: wrap;
    min-height:200px;
    overflow-y:auto;
    font-size:16px;
    text-align:center;
    position:relative;
    padding:10px;
}
#pasteArea.hover { border-color:#4a90e2; background:#f0f7ff; color:#555; }
#pasteArea img {
    max-width:40%;
    margin:5px;
    border-radius:15px;
    box-shadow:0 5px 25px rgba(0,0,0,0.25);
    transition: transform 0.3s ease;
}
#pasteArea img:hover { transform: scale(1.05); }

/* --- Output --- */
#output {
    margin:10px 20px 20px;
    flex:none;
    max-height:250px;
    overflow-y:auto;
}
#output img {
    width:100%;
    border-radius:25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    display:block;
}

/* --- Controls --- */
.controls {
    display:flex;
    flex-wrap:wrap;
    justify-content:space-around;
    padding:10px 15px;
    background:rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-top-left-radius:30px;
    border-top-right-radius:30px;
    gap:5px;
}
.controls select, .controls input, .controls button {
    border-radius:20px;
    padding:8px 12px;
    font-size:14px;
    border:none;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition: all 0.3s;
}
.controls button { background:#4a90e2; color:white; }
.controls button:hover { background:#357ABD; transform:scale(1.05); }
#refreshButton { background:#f44336; }
#refreshButton:hover { background:#c12a1f; transform:scale(1.05); }
select,input { background:#fff; border:1px solid #ccc; }

/* --- Home Indicator --- */
.home-indicator {
    width:134px;
    height:5px;
    background:rgba(0,0,0,0.3);
    border-radius:5px;
    margin:10px auto;
}

/* --- Reflections --- */
.screen::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background: linear-gradient(120deg, rgba(255,255,255,0.2), transparent 50%, rgba(255,255,255,0.05));
    pointer-events:none;
}

/* --- Responsive --- */
@media(max-width:400px){
    .iphone-frame { width:100%; height:90vh; border-radius:40px; }
    #pasteArea img { max-width:40%; }
    .controls { flex-direction:column; align-items:stretch; }
}
</style>
</head>
<body>

<div class="iphone-frame">
    <div class="screen">
        <div class="notch"></div>
        <div class="top-bar">Status Logger</div>
        <div id="pasteArea">Paste image(s) here using Ctrl+V</div>
        <div id="output"></div>
        <div class="controls">
            <select id="status">
                <option value="Time in">Time in</option>
                <option value="Short Break">Short Break</option>
                <option value="Meal Break">Meal Break</option>
                <option value="Wellness">Wellness</option>
                <option value="None">None</option>
            </select>
            <select id="fontSelect">
                <option value="Arial">Arial</option>
                <option value="Verdana">Verdana</option>
                <option value="Tahoma">Tahoma</option>
                <option value="Courier New">Courier New</option>
            </select>
            <input type="number" id="fontSize" placeholder="Size" value="20" min="10" max="100">
            <select id="position">
                <option value="top-left">Top Left</option>
                <option value="top-center">Top Center</option>
                <option value="top-right">Top Right</option>
                <option value="bottom-left">Bottom Left</option>
                <option value="bottom-center" selected>Bottom Center</option>
                <option value="bottom-right">Bottom Right</option>
                <option value="center">Center</option>
            </select>
            <button id="generateImage">Generate</button>
            <button id="refreshButton">Refresh</button>
        </div>
        <div class="home-indicator"></div>
    </div>
</div>

<script>
// --- JS logic ---
const pasteArea = document.getElementById('pasteArea');
const generateButton = document.getElementById('generateImage');
const refreshButton = document.getElementById('refreshButton');
const outputDiv = document.getElementById('output');

const statusSelect = document.getElementById('status');
const fontSelect = document.getElementById('fontSelect');
const fontSizeInput = document.getElementById('fontSize');
const positionSelect = document.getElementById('position');

let images = [];

// Drag & Paste
pasteArea.addEventListener('dragenter', () => pasteArea.classList.add('hover'));
pasteArea.addEventListener('dragleave', () => pasteArea.classList.remove('hover'));
pasteArea.addEventListener('dragover', e => e.preventDefault());
pasteArea.addEventListener('drop', e => e.preventDefault());

// Paste Images
pasteArea.addEventListener('paste', event => {
    const items = event.clipboardData.items;
    for(let i=0;i<items.length;i++){
        if(items[i].type.indexOf('image')!==-1){
            const file = items[i].getAsFile();
            const reader = new FileReader();
            reader.onload = e=>{
                const img = document.createElement('img');
                img.src = e.target.result;
                img.style.width='80px'; // thumbnail
                img.style.height='auto';
                pasteArea.innerHTML=''; // clear placeholder
                images.push(img);

                // Show all images
                images.forEach(im=>{
                    if(!pasteArea.contains(im)) pasteArea.appendChild(im);
                });

                // Limit to 2 preview images
                if(images.length>2){
                    images.shift();
                    pasteArea.innerHTML='';
                    images.forEach(im=>pasteArea.appendChild(im));
                }
            };
            reader.readAsDataURL(file);
        }
    }
});

// Generate full-size image
generateButton.addEventListener('click', () => {
    if(images.length===0){ alert('Please paste at least one image.'); return; }

    const status = statusSelect.value;
    const font = fontSelect.value;
    const fontSize = parseInt(fontSizeInput.value)||20;
    const position = positionSelect.value;
    const timestamp = new Date().toLocaleString();

    const width = images.reduce((sum,img)=>sum+img.naturalWidth,0);
    const height = Math.max(...images.map(img=>img.naturalHeight));

    const canvas = document.createElement('canvas');
    canvas.width=width;
    canvas.height=height;
    const ctx = canvas.getContext('2d');

    // Draw images
    let x=0;
    images.forEach(img=>{
        ctx.drawImage(img,x,0,img.naturalWidth,img.naturalHeight);
        const grad=ctx.createLinearGradient(x,0,x+img.naturalWidth,img.naturalHeight);
        grad.addColorStop(0,'rgba(255,255,255,0.15)');
        grad.addColorStop(0.5,'rgba(255,255,255,0)');
        ctx.fillStyle=grad;
        ctx.fillRect(x,0,img.naturalWidth,img.naturalHeight);
        x+=img.naturalWidth;
    });

    const text = status==='None'? timestamp:`${status} | ${timestamp}`;
    ctx.font=`${fontSize}px ${font}`;
    ctx.textBaseline='top';
    const textWidth=ctx.measureText(text).width;
    const padding=10;
    let rectX, rectY;

    switch(position){
        case 'top-left': rectX=padding; rectY=padding; break;
        case 'top-center': rectX=(width-textWidth)/2; rectY=padding; break;
        case 'top-right': rectX=width-textWidth-padding; rectY=padding; break;
        case 'bottom-left': rectX=padding; rectY=height-fontSize-padding; break;
        case 'bottom-center': rectX=(width-textWidth)/2; rectY=height-fontSize-padding; break;
        case 'bottom-right': rectX=width-textWidth-padding; rectY=height-fontSize-padding; break;
        case 'center': rectX=(width-textWidth)/2; rectY=(height-fontSize)/2; break;
    }

    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(rectX-5,rectY-5,textWidth+10,fontSize+10);

    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(255,255,255,0.5)';
    ctx.shadowBlur=6;
    ctx.fillText(text,rectX,rectY);

    outputDiv.innerHTML='';
    const finalImg=new Image();
    finalImg.src=canvas.toDataURL('image/png');
    outputDiv.appendChild(finalImg);

    // Auto-copy
    canvas.toBlob(async blob=>{
        if(!blob) return;
        try{
            await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        }catch(err){ console.error('Copy failed',err); }
    },'image/png');

    images=[];
    pasteArea.innerHTML='Paste image(s) here using Ctrl+V';
});

// Refresh
refreshButton.addEventListener('click',()=>{
    images=[];
    pasteArea.innerHTML='Paste image(s) here using Ctrl+V';
    outputDiv.innerHTML='';
    statusSelect.selectedIndex=0;
    positionSelect.value='bottom-center';
});
</script>

</body>
</html>
